name: Build Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (e.g. v26.5.15.1)"
        required: false
        type: string

permissions:
  contents: read
  packages: read

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 – Build standalone CLI binaries
  # ---------------------------------------------------------------------------
  build-cli:
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            cgo_enabled: 1
            goos: darwin
            goarch: arm64
          - os: macos-15-intel
            cgo_enabled: 1
            goos: darwin
            goarch: amd64
          - os: ubuntu-latest
            cgo_enabled: 0
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            cgo_enabled: 0
            goos: linux
            goarch: arm64
          - os: windows-latest
            cgo_enabled: 0
            goos: windows
            goarch: amd64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache-dependency-path: |
            src/services/*/go.sum

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release metadata
        id: release_meta
        run: |
          INPUT_VERSION="${{ inputs.version }}" \
          FALLBACK_VERSION="dev" \
            node .github/scripts/resolve-release-version.mjs

      - name: Build CLI
        run: |
          PACKAGE_NAME="ark-${{ matrix.goos }}-${{ matrix.goarch }}"
          BIN_NAME="ark"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BIN_NAME="${BIN_NAME}.exe"
          fi
          mkdir -p "package/${PACKAGE_NAME}" dist
          pnpm --filter web build
          CGO_ENABLED=${{ matrix.cgo_enabled }} GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -tags desktop -trimpath -ldflags "-s -w -X main.version=${{ steps.release_meta.outputs.tag }}" \
            -o "package/${PACKAGE_NAME}/${BIN_NAME}" \
            ./src/services/cli/cmd/ark
          cp -R src/apps/web/dist "package/${PACKAGE_NAME}/web"
          mkdir -p "package/${PACKAGE_NAME}/src"
          cp -R src/personas "package/${PACKAGE_NAME}/src/personas"
          cp -R src/skills "package/${PACKAGE_NAME}/src/skills"
          tar -czf "dist/${PACKAGE_NAME}.tar.gz" -C package "${PACKAGE_NAME}"
          echo "Built dist/${PACKAGE_NAME}.tar.gz"
          ls -lh dist/

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 2 – Build Electron installers per platform
  # ---------------------------------------------------------------------------
  build-desktop:
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            electron_arch: arm64
            goos: darwin
            goarch: arm64
            cgo_enabled: 1
            builder_args: --mac --arm64
          - os: macos-15-intel
            platform: darwin
            electron_arch: x64
            goos: darwin
            goarch: amd64
            cgo_enabled: 1
            builder_args: --mac --x64
          - os: ubuntu-latest
            platform: linux
            electron_arch: x64
            goos: linux
            goarch: amd64
            cgo_enabled: 0
            builder_args: --linux --x64
          - os: windows-latest
            platform: win32
            electron_arch: x64
            goos: windows
            goarch: amd64
            cgo_enabled: 0
            builder_args: --win --x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache-dependency-path: |
            src/services/*/go.sum

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Resolve release metadata
        id: release_meta
        run: |
          INPUT_VERSION="${{ inputs.version }}" \
          FALLBACK_VERSION="$(node -p "require('./src/apps/desktop/package.json').version")" \
            node .github/scripts/resolve-release-version.mjs

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: electron-${{ matrix.os }}-${{ hashFiles('src/apps/desktop/package.json') }}
          restore-keys: electron-${{ matrix.os }}-

      - name: Install deps & build sidecar
        run: |
          mkdir -p src/apps/desktop/sidecar-bin
          BIN_NAME="desktop-${{ matrix.platform }}-${{ matrix.electron_arch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then BIN_NAME="${BIN_NAME}.exe"; fi
          CGO_ENABLED=${{ matrix.cgo_enabled }} GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -tags desktop -trimpath -ldflags '-s -w' \
            -o "src/apps/desktop/sidecar-bin/${BIN_NAME}" \
            ./src/services/desktop/cmd/desktop &
          GO_PID=$!
          pnpm install --frozen-lockfile
          wait $GO_PID
          if [ "${{ runner.os }}" != "Windows" ]; then chmod +x src/apps/desktop/sidecar-bin/*; fi

      - name: Install Linux packaging dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Build web app
        run: pnpm --filter @arkloop/desktop build:web

      - name: Build bundled CLI
        run: ARKLOOP_RELEASE_VERSION="${{ steps.release_meta.outputs.tag }}" node src/apps/desktop/scripts/build-cli.mjs --platform ${{ matrix.platform }} --arch ${{ matrix.electron_arch }}

      - name: Clear release meta
        run: rm -f src/apps/desktop/dist/release-meta.json

      - name: Build Electron TypeScript
        run: pnpm --filter @arkloop/desktop build:electron

      - name: Run electron-builder (macOS)
        if: matrix.platform == 'darwin'
        working-directory: src/apps/desktop
        run: |
          if [ -n "${{ secrets.MAC_CSC_LINK }}" ]; then export CSC_LINK="${{ secrets.MAC_CSC_LINK }}"; fi
          if [ -n "${{ secrets.MAC_CSC_KEY_PASSWORD }}" ]; then export CSC_KEY_PASSWORD="${{ secrets.MAC_CSC_KEY_PASSWORD }}"; fi
          if [ -n "${{ secrets.APPLE_ID }}" ]; then export APPLE_ID="${{ secrets.APPLE_ID }}"; fi
          if [ -n "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" ]; then export APPLE_APP_SPECIFIC_PASSWORD="${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"; fi
          if [ -n "${{ secrets.APPLE_TEAM_ID }}" ]; then export APPLE_TEAM_ID="${{ secrets.APPLE_TEAM_ID }}"; fi
          pnpm exec electron-builder ${{ matrix.builder_args }} --publish never -c.extraMetadata.version=${{ steps.release_meta.outputs.version }}

      - name: Run electron-builder (Linux)
        if: matrix.platform == 'linux'
        working-directory: src/apps/desktop
        run: pnpm exec electron-builder ${{ matrix.builder_args }} --publish never -c.extraMetadata.version=${{ steps.release_meta.outputs.version }}

      - name: Run electron-builder (Windows)
        if: matrix.platform == 'win32'
        working-directory: src/apps/desktop
        run: pnpm exec electron-builder ${{ matrix.builder_args }} --publish never -c.extraMetadata.version=${{ steps.release_meta.outputs.version }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-installer-${{ matrix.platform }}-${{ matrix.electron_arch }}
          path: |
            src/apps/desktop/release/*.dmg
            src/apps/desktop/release/*.zip
            src/apps/desktop/release/*.AppImage
            src/apps/desktop/release/*.deb
            src/apps/desktop/release/*.rpm
            src/apps/desktop/release/*.exe
            src/apps/desktop/release/*.blockmap
            src/apps/desktop/release/latest*.yml
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 3 – Build Arch Linux package
  # ---------------------------------------------------------------------------
  build-archlinux-package:
    name: Build Arch Linux pkg.tar.zst
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Install build tools
        run: |
          pacman -Syu --noconfirm --needed \
            alsa-lib \
            at-spi2-core \
            base-devel \
            git \
            go \
            gtk3 \
            libappindicator-gtk3 \
            libdrm \
            libnotify \
            libxcomposite \
            libxdamage \
            libxkbcommon \
            libxrandr \
            libxss \
            mesa \
            nodejs \
            nss \
            pnpm \
            python \
            xdg-utils

      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: release_meta
        run: |
          INPUT_VERSION="${{ inputs.version }}" \
          FALLBACK_VERSION="$(node -p "require('./src/apps/desktop/package.json').version")" \
            node .github/scripts/resolve-release-version.mjs

      - name: Build Arch package
        run: |
          useradd -m builder
          chown -R builder:builder "${GITHUB_WORKSPACE}"
          su builder -c "cd '${GITHUB_WORKSPACE}/packaging/arch' && ARKLOOP_DESKTOP_VERSION='${{ steps.release_meta.outputs.version }}' ARKLOOP_RELEASE_VERSION='${{ steps.release_meta.outputs.tag }}' makepkg -s --noconfirm"

      - name: List package
        run: ls -lh packaging/arch/*.pkg.tar.zst

      - name: Upload Arch package artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-installer-archlinux-x64
          path: packaging/arch/*.pkg.tar.zst
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 4 – Create GitHub Release with all assets
  # ---------------------------------------------------------------------------
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-cli, build-desktop, build-archlinux-package]
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve release metadata
        id: release_meta
        run: |
          INPUT_VERSION="${{ inputs.version }}" \
          FALLBACK_VERSION="$(node -p "require('./src/apps/desktop/package.json').version")" \
            node .github/scripts/resolve-release-version.mjs

      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-installer-*
          path: release-assets/installers/

      - name: Download all CLI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          path: release-assets/cli/

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Collect release files
        run: |
          mkdir -p release-files
          find release-assets -type f \( \
            -name '*.dmg' -o \
            -name '*.zip' -o \
            -name '*.AppImage' -o \
            -name '*.deb' -o \
            -name '*.rpm' -o \
            -name '*.pkg.tar.zst' -o \
            -name '*.exe' -o \
            -name 'ark-*.tar.gz' -o \
            -name '*.blockmap' -o \
            -name 'latest*.yml' \
          \) -exec cp {} release-files/ \;
          rm -f release-files/latest-mac.yml
          python3 - <<'PY'
          from pathlib import Path

          installers_root = Path('release-assets/installers')
          release_dir = Path('release-files')
          latest_mac_sources = sorted(installers_root.glob('**/latest-mac.yml'))
          if not latest_mac_sources:
              raise SystemExit('missing latest-mac.yml in installer artifacts')

          def parse_scalar(value: str) -> str:
              value = value.split(' #', 1)[0].strip()
              if len(value) >= 2 and value[0] == value[-1] and value[0] in {'"', "'"}:
                  return value[1:-1]
              return value

          merged_files = []
          release_date = ''
          version = ''
          for latest_mac in latest_mac_sources:
              text = latest_mac.read_text()
              lines = text.splitlines()
              in_files = False
              current_item = None
              current_indent = None
              for raw_line in lines:
                  stripped = raw_line.strip()
                  if not stripped:
                      continue
                  if stripped == 'files:':
                      in_files = True
                      continue
                  if not in_files:
                      if stripped.startswith('version:') and not version:
                          version = parse_scalar(stripped.split(':', 1)[1])
                      elif stripped.startswith('releaseDate:') and not release_date:
                          release_date = parse_scalar(stripped.split(':', 1)[1])
                      continue
                  indent = len(raw_line) - len(raw_line.lstrip(' '))
                  if stripped.startswith('- '):
                      if current_item:
                          merged_files.append(current_item)
                      current_item = {}
                      current_indent = indent
                      body = stripped[2:].strip()
                      if body.startswith('url:'):
                          current_item['url'] = parse_scalar(body.split(':', 1)[1])
                      continue
                  if current_item is None or current_indent is None:
                      continue
                  if indent <= current_indent:
                      merged_files.append(current_item)
                      current_item = None
                      current_indent = None
                      continue
                  if ':' not in stripped:
                      continue
                  key, value = stripped.split(':', 1)
                  current_item[key.strip()] = parse_scalar(value)
              if current_item:
                  merged_files.append(current_item)

          deduped = []
          seen_urls = set()
          for item in merged_files:
              url = item.get('url', '')
              if not url or url in seen_urls:
                  continue
              seen_urls.add(url)
              deduped.append(item)

          if not deduped:
              raise SystemExit('no files found while merging latest-mac.yml assets')

          zip_entry = next((item for item in deduped if str(item.get('url', '')).endswith('.zip')), None)
          if zip_entry is None:
              raise SystemExit('merged latest-mac.yml must include a zip file')

          if not any(str(item.get('url', '')).endswith('arm64.zip') for item in deduped):
              raise SystemExit('merged latest-mac.yml must include arm64 zip')
          if not any(str(item.get('url', '')).endswith('x64.zip') for item in deduped):
              raise SystemExit('merged latest-mac.yml must include x64 zip')

          out = [f'version: {version}'] if version else []
          out.append('files:')
          for item in deduped:
              out.append(f"  - url: {item['url']}")
              if 'sha512' in item:
                  out.append(f"    sha512: {item['sha512']}")
              if 'size' in item:
                  out.append(f"    size: {item['size']}")
          out.append(f"path: {zip_entry['url']}")
          if 'sha512' in zip_entry:
              out.append(f"sha512: {zip_entry['sha512']}")
          if release_date:
              out.append(f"releaseDate: '{release_date}'")

          (release_dir / 'latest-mac.yml').write_text('\n'.join(out) + '\n')
          PY
          echo "--- Release files ---"
          ls -lh release-files/

      - name: Validate release files
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path

          release_dir = Path('release-files')
          mac_zip_files = sorted(path.name for path in release_dir.glob('*mac*.zip'))
          if not mac_zip_files:
              raise SystemExit('missing mac zip in release-files')

          latest_mac = release_dir / 'latest-mac.yml'
          if not latest_mac.exists():
              raise SystemExit('missing latest-mac.yml in release-files')
          if not (release_dir / 'latest.yml').exists():
              raise SystemExit('missing latest.yml in release-files')

          text = latest_mac.read_text()

          def parse_scalar(value: str) -> str:
              value = value.split(' #', 1)[0].strip()
              if len(value) >= 2 and value[0] == value[-1] and value[0] in {'"', "'"}:
                  return value[1:-1]
              return value

          path_match = re.search(r'(?m)^path:\s*(.+?)\s*$', text)
          yml_path = parse_scalar(path_match.group(1)) if path_match else ''

          first_file_url = ''
          lines = text.splitlines()
          for index, raw_line in enumerate(lines):
              stripped = raw_line.strip()
              if stripped != 'files:':
                  continue
              files_indent = len(raw_line) - len(raw_line.lstrip(' '))
              current_item_indent = None
              for nested_line in lines[index + 1:]:
                  nested_stripped = nested_line.strip()
                  if not nested_stripped or nested_stripped.startswith('#'):
                      continue
                  nested_indent = len(nested_line) - len(nested_line.lstrip(' '))
                  if nested_indent <= files_indent and not nested_stripped.startswith('-'):
                      break
                  if nested_stripped.startswith('- '):
                      current_item_indent = nested_indent
                      item_body = nested_stripped[2:].strip()
                      if item_body.startswith('url:'):
                          first_file_url = parse_scalar(item_body[4:])
                          break
                      continue
                  if current_item_indent is not None and nested_indent > current_item_indent and nested_stripped.startswith('url:'):
                      first_file_url = parse_scalar(nested_stripped[4:])
                      break
              break

          if not (yml_path.endswith('.zip') or first_file_url.endswith('.zip')):
              raise SystemExit(
                  f'latest-mac.yml must point to a .zip file, got path={yml_path or "<missing>"} '
                  f'files[0].url={first_file_url or "<missing>"}'
              )
          if 'Arkloop-mac-arm64.zip' not in text:
              raise SystemExit('latest-mac.yml missing arm64 zip entry')
          if 'Arkloop-mac-x64.zip' not in text:
              raise SystemExit('latest-mac.yml missing x64 zip entry')
          PY

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"

      - name: Write release notes
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          RELEASE_VERSION: ${{ steps.release_meta.outputs.release_version }}
          CURSOR_MODEL: composer-2
        run: node .github/scripts/write-release-notes.mjs

      - name: Generate desktop manifest
        env:
          ARKLOOP_RELEASE_VERSION: ${{ steps.release_meta.outputs.release_version }}
          ARKLOOP_DESKTOP_MANIFEST_OUTPUT: release-files/desktop-manifest.json
          ARKLOOP_RELEASE_DIR: release-files
          ARKLOOP_OPENVIKING_IMAGE: ghcr.io/volcengine/openviking:v0.3.3
          ARKLOOP_OPENVIKING_VERSION: v0.3.3
        run: node src/apps/desktop/scripts/generate-desktop-manifest.mjs

      - name: Validate desktop manifest
        env:
          ARKLOOP_EXPECTED_VERSION: ${{ steps.release_meta.outputs.release_version }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest_path = Path('release-files/desktop-manifest.json')
          if not manifest_path.exists():
              raise SystemExit('desktop-manifest.json missing')

          manifest = json.loads(manifest_path.read_text())
          expected = os.environ['ARKLOOP_EXPECTED_VERSION'].lstrip('v')

          def require(value, key):
              if not isinstance(value, str) or not value.strip():
                  raise SystemExit(f'invalid manifest field: {key}')
              return value

          version = require(manifest.get('version'), 'version')
          if version != expected:
              raise SystemExit(f'manifest version mismatch: {version} != {expected}')

          openviking = manifest.get('openviking', {})
          require(openviking.get('version'), 'openviking.version')
          require(openviking.get('image'), 'openviking.image')

          sandbox = manifest.get('sandbox') or {}
          for key in ('kernel', 'rootfs'):
              item = sandbox.get(key)
              if not item:
                  continue
              filename = require(item.get('filename'), f'sandbox.{key}.filename')
              require(item.get('version'), f'sandbox.{key}.version')
              if not Path('release-files', filename).exists():
                  raise SystemExit(f'missing manifest asset: {filename}')
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          body_path: release-notes.md
          files: release-files/*

      - name: Dispatch package update workflows
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.release_meta.outputs.version }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
          WORKFLOW_REF: ${{ github.event.repository.default_branch }}
        run: |
          mapfile -t arch_assets < <(find release-files -maxdepth 1 -type f -name 'arkloop-bin-*.pkg.tar.zst' -printf '%f\n' | sort)
          if [ "${#arch_assets[@]}" -ne 1 ]; then
            echo "Expected one arkloop-bin pkg.tar.zst asset, found ${#arch_assets[@]}" >&2
            exit 1
          fi
          arch_asset="${arch_assets[0]}"
          arch_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${arch_asset}"

          gh workflow run update-aur-bin.yaml \
            --ref "${WORKFLOW_REF}" \
            -f version="${VERSION}" \
            -f tag="${RELEASE_TAG}" \
            -f asset_url="${arch_url}"

          gh workflow run update-homebrew-formula.yaml \
            --ref "${WORKFLOW_REF}" \
            -f version="${VERSION}" \
            -f tag="${RELEASE_TAG}"
