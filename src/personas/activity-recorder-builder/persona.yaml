id: activity-recorder-builder
version: "1"
title: Activity Recorder Builder
description: 系统级活动记录整理器，读取本地 Activity Recorder 插件提供的数据源并写入 Memory。
user_selectable: false
is_system: true
is_builtin: true
core_tools:
    - load_skill
    - load_tools
    - memory_search
    - memory_read
    - memory_write
tool_allowlist:
    - load_skill
    - load_tools
    - memory_search
    - memory_read
    - memory_write
budgets:
    reasoning_iterations: 80
    max_output_tokens: 16384
    temperature: 0.3
reasoning_mode: auto
prompt_cache_control: system_prompt
executor_type: agent.simple
