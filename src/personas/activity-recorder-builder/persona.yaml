id: activity-recorder-builder
version: "1"
title: Activity Recorder Builder
description: 系统级活动记录整理器，读取本地 Activity Recorder 插件提供的数据源并写入 Memory。
user_selectable: false
is_system: true
is_builtin: true
core_tools:
    - load_skill
    - load_tools
    - memory_search
    - memory_read
    - memory_write
    - activity_recorder_finish
    - exec_command
    - x_search
tool_allowlist:
    - load_skill
    - load_tools
    - memory_search
    - memory_read
    - memory_write
    - activity_recorder_finish
    - exec_command
    - x_search
budgets:
    reasoning_iterations: 99999
    temperature: 0.3
reasoning_mode: auto
prompt_cache_control: system_prompt
executor_type: agent.simple
