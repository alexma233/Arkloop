schemaVersion: 1
id: arkloop.plugins.activity-recorder
name: Activity Recorder
version: 0.2.0
publisher: arkloop
description: Record local desktop activity through the unified activity-record daemon and optional Screenpipe capture.
host_requirement: desktop_local
platforms: [darwin, linux, windows]

settings:
  - key: mode
    type: select
    default: lightweight
    options: [lightweight, full, custom]
  - key: enable_window_tracking
    type: boolean
    default: true
  - key: enable_clipboard
    type: boolean
    default: true
  - key: enable_clipboard_content
    type: boolean
    default: false
  - key: enable_keyboard
    type: boolean
    default: false
  - key: enable_mouse_tracking
    type: boolean
    default: true
  - key: enable_screentime
    type: boolean
    default: true
  - key: idle_threshold_sec
    type: integer
    default: 300
  - key: sync_interval_sec
    type: integer
    default: 300
  - key: enable_screenpipe
    type: boolean
    default: false
  - key: enable_audio
    type: boolean
    default: false
  - key: transcription_engine
    type: select
    default: disabled
    options: [disabled, whisper-tiny, parakeet, deepgram, openai-compatible]
  - key: video_quality
    type: select
    default: low
    options: [low, balanced, high]
  - key: capture_interval_ms
    type: integer
    default: 120000
  - key: retention_days
    type: integer
    default: 3
  - key: meeting_detector
    type: boolean
    default: false
  - key: snapshot_compaction
    type: boolean
    default: false
  - key: builder_interval_min
    type: integer
    default: 300

runtime:
  - id: screenpipe
    detect:
      - path: npx
    daemon:
      command: npx
      enabled_when:
        - setting: enable_screenpipe
          equals: true
      args:
        - "-y"
        - "screenpipe@latest"
        - "record"
        - "--audio-transcription-engine"
        - "${settings.transcription_engine}"
        - "--video-quality"
        - "${settings.video_quality}"
        - "--idle-capture-interval-ms"
        - "${settings.capture_interval_ms}"
        - "--visual-check-interval-ms"
        - "5000"
        - "--min-capture-interval-ms"
        - "10000"
        - "--disable-telemetry"
        - "--retention-days"
        - "${settings.retention_days}"
      args_when:
        - setting: enable_audio
          equals: false
          args: ["--disable-audio"]
        - setting: meeting_detector
          equals: false
          args: ["--disable-meeting-detector"]
        - setting: snapshot_compaction
          equals: false
          args: ["--disable-snapshot-compaction"]
      health_url: "http://127.0.0.1:3030/health"

mcp_servers:
  - server_id: screenpipe
    display_name: Screenpipe
    transport: stdio
    command: npx
    args: ["-y", "screenpipe-mcp"]
    enabled_when:
      - setting: enable_screenpipe
        equals: true

skills:
  - skill_key: activity-record
    bundle: skills/activity-record
    version: "0.1.0"
  - skill_key: screenpipe-api
    bundle: skills/screenpipe-api
    version: "0.1.0"
  - skill_key: screenpipe-health
    bundle: skills/screenpipe-health
    version: "0.1.0"
  - skill_key: screenpipe-logs
    bundle: skills/screenpipe-logs
    version: "0.1.0"
  - skill_key: activity-recorder
    bundle: skills/activity-recorder
    version: "0.1.0"

context: context.md
